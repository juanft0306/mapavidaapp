<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba de clic</title>
</head>
<body>
  <h1>MapaVida - Prueba</h1>
  <button id="btnAgregar">+ Agregar Refugio</button>

  <script>
    // ✅ Alerta al cargar la página
    alert('🚀 Página cargada');

    // Buscar el botón
    const btn = document.getElementById('btnAgregar');
    
    // Verificar si existe
    if (!btn) {
      alert('❌ Botón no encontrado');
    } else {
      alert('✅ Botón encontrado');
      
      // Asignar evento
      btn.addEventListener('click', function() {
        alert('🔥 ¡CLICK DETECTADO!');
      });
    }
  </script>
</body>
</html>
