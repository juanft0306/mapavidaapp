<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MapaVida - Refugios</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; }
    #map { height: 70vh; width: 100%; }
    #header {
      background: #E53935;
      color: white;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 8vh;
    }
    #header button {
      background: white;
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: bold;
      color: #E53935;
      cursor: pointer;
    }
    #formulario {
      display: none;
      background: white;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1000;
    }
    #formulario input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    #formulario button {
      background: #E53935;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      font-weight: bold;
      width: 100%;
      margin-top: 5px;
      cursor: pointer;
    }
    .visible { display: block !important; }
  </style>
</head>
<body>
  <div id="header">
    <span>🆘 MapaVida</span>
    <button id="btnAgregar">+ Agregar Refugio</button>
  </div>
  <div id="map"></div>

  <div id="formulario">
    <h3>📝 Agregar Refugio</h3>
    <input type="text" id="fNombre" placeholder="Nombre">
    <input type="number" id="fLat" placeholder="Latitud" step="any">
    <input type="number" id="fLng" placeholder="Longitud" step="any">
    <button id="btnGuardar">✅ Guardar</button>
    <button id="btnCancelar" type="button">❌ Cancelar</button>
  </div>

  <script>
    // 🔥 CONFIGURACIÓN
    const SUPABASE_URL = 'https://gtaadqluoljexglenbqo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_n_h1fN6QWuEWbFxrCTKFvQ_rxw-o9-Y';

    alert('🚀 1. Iniciando script');

    // Inicializar Supabase
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    alert('✅ 2. Supabase creado');

    // Mapa
    const map = L.map('map').setView([10.4806, -66.9036], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    alert('✅ 3. Mapa creado');

    // Elementos
    const btnAgregar = document.getElementById('btnAgregar');
    const formulario = document.getElementById('formulario');
    const btnGuardar = document.getElementById('btnGuardar');
    const btnCancelar = document.getElementById('btnCancelar');
    alert('✅ 4. Elementos obtenidos');

    // Evento mostrar formulario
    btnAgregar.addEventListener('click', function() {
      alert('📝 5. Botón clickeado');
      formulario.classList.toggle('visible');
      if (formulario.classList.contains('visible')) {
        formulario.style.display = 'block';
      } else {
        formulario.style.display = 'none';
      }
    });

    // Evento guardar
    btnGuardar.addEventListener('click', async function() {
      alert('💾 6. Guardar clickeado');
      const nombre = document.getElementById('fNombre').value.trim();
      const lat = parseFloat(document.getElementById('fLat').value);
      const lng = parseFloat(document.getElementById('fLng').value);

      if (!nombre) { alert('❌ Nombre obligatorio'); return; }
      if (isNaN(lat) || isNaN(lng)) { alert('❌ Coordenadas inválidas'); return; }

      alert(`📦 Datos: ${nombre}, ${lat}, ${lng}`);

      const { error } = await supabase.from('refugios').insert([{ nombre, lat, lng }]);
      if (error) {
        alert('❌ Error de Supabase: ' + error.message);
      } else {
        alert('✅ Guardado exitoso');
        formulario.classList.remove('visible');
        formulario.style.display = 'none';
        document.getElementById('fNombre').value = '';
        document.getElementById('fLat').value = '';
        document.getElementById('fLng').value = '';
      }
    });

    btnCancelar.addEventListener('click', function() {
      formulario.classList.remove('visible');
      formulario.style.display = 'none';
    });

    alert('✅ 7. Script completado');
  </script>
</body>
</html>
