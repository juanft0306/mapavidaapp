<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapaVida - Versión Segura</title>
  <!-- Cargar Leaflet y Supabase de forma SECUENCIAL -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { font-family: Arial; }
    #map { height: 85vh; width: 100%; }
    #header {
      background: #E53935;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 60px;
    }
    #header button {
      background: white;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: bold;
      color: #E53935;
      cursor: pointer;
    }
    #formulario {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      z-index: 2000;
      width: 90%;
      max-width: 350px;
    }
    #formulario input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    #formulario button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
    #btnGuardar { background: #4CAF50; color: white; }
    #btnCancelar { background: #666; color: white; }
  </style>
</head>
<body>

  <div id="header">
    <span>🆘 MapaVida</span>
    <button id="btnAgregar">+ Agregar Refugio</button>
  </div>
  <div id="map"></div>

  <div id="formulario">
    <h3>📝 Nuevo Refugio</h3>
    <input type="text" id="fNombre" placeholder="Nombre *" required>
    <input type="text" id="fDireccion" placeholder="Dirección">
    <input type="number" id="fLat" placeholder="Latitud *" step="any" required>
    <input type="number" id="fLng" placeholder="Longitud *" step="any" required>
    <input type="number" id="fCupo" placeholder="Cupo">
    <button id="btnGuardar">✅ Guardar</button>
    <button id="btnCancelar" type="button">❌ Cancelar</button>
  </div>

  <script>
    // ============================================================
    // PASO 1: Verificar que las librerías se cargaron
    // ============================================================
    if (typeof L === 'undefined') {
      alert('❌ ERROR: Leaflet no se cargó');
      throw new Error('Leaflet no cargado');
    }
    if (typeof supabase === 'undefined') {
      alert('❌ ERROR: Supabase no se cargó');
      throw new Error('Supabase no cargado');
    }
    alert('✅ Librerías cargadas correctamente');

    // ============================================================
    // PASO 2: Configurar Supabase (REEMPLAZA TU CLAVE)
    // ============================================================
    const SUPABASE_URL = 'https://gtaadqluoljexglenbqo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_n_h1fN6QWuEWbFxrCTKFvQ_rxw-o9-Y'; // <--- PON AQUÍ TU CLAVE

    let supabaseClient;
    try {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      alert('✅ Supabase inicializado');
    } catch (e) {
      alert('❌ Error al inicializar Supabase: ' + e.message);
      throw e;
    }

    // ============================================================
    // PASO 3: Crear el mapa
    // ============================================================
    let map;
    try {
      map = L.map('map').setView([10.4806, -66.9036], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: 'MapaVida'
      }).addTo(map);
      alert('✅ Mapa creado');
    } catch (e) {
      alert('❌ Error al crear el mapa: ' + e.message);
      throw e;
    }

    // ============================================================
    // PASO 4: Asignar evento al botón (con verificación)
    // ============================================================
    const btn = document.getElementById('btnAgregar');
    if (!btn) {
      alert('❌ Botón no encontrado en el DOM');
    } else {
      alert('✅ Botón encontrado, asignando evento...');
      
      // Usar onclick directamente para máxima compatibilidad
      btn.onclick = function(e) {
        e.preventDefault();
        alert('🔥 Botón clickeado (desde onclick)');
        const form = document.getElementById('formulario');
        if (form.style.display === 'block') {
          form.style.display = 'none';
        } else {
          form.style.display = 'block';
        }
      };
      
      // También agregar addEventListener por si acaso
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        alert('🔥 Botón clickeado (desde addEventListener)');
      });
    }

    // ============================================================
    // PASO 5: Manejar el formulario
    // ============================================================
    document.getElementById('btnCancelar').addEventListener('click', function() {
      document.getElementById('formulario').style.display = 'none';
      limpiarFormulario();
    });

    function limpiarFormulario() {
      document.getElementById('fNombre').value = '';
      document.getElementById('fDireccion').value = '';
      document.getElementById('fLat').value = '';
      document.getElementById('fLng').value = '';
      document.getElementById('fCupo').value = '';
    }

    document.getElementById('btnGuardar').addEventListener('click', async function() {
      alert('💾 Intentando guardar...');
      
      const nombre = document.getElementById('fNombre').value.trim();
      const direccion = document.getElementById('fDireccion').value.trim();
      const lat = parseFloat(document.getElementById('fLat').value);
      const lng = parseFloat(document.getElementById('fLng').value);
      const cupo = parseInt(document.getElementById('fCupo').value) || 0;

      if (!nombre) { alert('❌ Nombre obligatorio'); return; }
      if (isNaN(lat) || isNaN(lng)) { alert('❌ Coordenadas inválidas'); return; }

      const { error } = await supabaseClient
        .from('refugios')
        .insert([{ nombre, direccion, lat, lng, cupo }]);

      if (error) {
        alert('❌ Error de Supabase: ' + error.message);
        console.error('Error detallado:', error);
      } else {
        alert('✅ ¡Refugio guardado!');
        document.getElementById('formulario').style.display = 'none';
        limpiarFormulario();
        // Recargar refugios (opcional)
        cargarRefugios();
      }
    });

    // ============================================================
    // PASO 6: Función para cargar refugios (opcional por ahora)
    // ============================================================
    async function cargarRefugios() {
      try {
        const { data, error } = await supabaseClient.from('refugios').select('*');
        if (error) throw error;
        alert(`✅ ${data.length} refugios cargados`);
        // Mostrar en el mapa (lo haremos después)
      } catch (e) {
        alert('⚠️ Error al cargar refugios: ' + e.message);
      }
    }

    // Cargar al inicio
    cargarRefugios();

    alert('✅ Script completado correctamente');
  </script>
</body>
</html>
