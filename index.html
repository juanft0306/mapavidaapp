<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapaVida - Prueba</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; }
    button { padding: 15px 30px; background: #E53935; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🆘 MapaVida</h1>
  <button id="btnAgregar">+ Agregar Refugio</button>

  <script>
    // Mensaje en consola
    console.log('🚀 Script cargado');

    // Buscar el botón
    const btn = document.getElementById('btnAgregar');
    if (!btn) {
      alert('❌ Botón no encontrado');
    } else {
      alert('✅ Botón encontrado');
      btn.addEventListener('click', function() {
        alert('🔥 Botón clickeado');
      });
    }
  </script>
</body>
</html>
