<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapaVida - Beta</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; }
    #map { height: 85vh; width: 100%; }
    #header {
      background: #E53935;
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 60px;
    }
    #header button {
      background: white;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: bold;
      color: #E53935;
      cursor: pointer;
    }
    #formulario {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 2000;
      width: 90%;
      max-width: 400px;
    }
    #formulario input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    #formulario .coordenadas {
      background: #f0f0f0;
      padding: 8px;
      border-radius: 6px;
      margin: 6px 0;
      display: flex;
      justify-content: space-between;
    }
    #formulario button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    #btnGuardar { background: #4CAF50; color: white; }
    #btnCancelar { background: #666; color: white; }
    #cancelarSeleccion {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      z-index: 3000;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="header">
    <span>🆘 MapaVida</span>
    <button id="btnAgregar">+ Agregar Refugio</button>
  </div>
  <div id="map"></div>

  <div id="formulario">
    <h3>📝 Nuevo Refugio</h3>
    <input type="text" id="fNombre" placeholder="Nombre *" required />
    <input type="text" id="fDireccion" placeholder="Dirección (opcional)" />
    <div class="coordenadas">
      <span>📍 Lat:</span> <span id="fLatDisplay">---</span>
      <span>📍 Lng:</span> <span id="fLngDisplay">---</span>
    </div>
    <input type="number" id="fCupo" placeholder="Cupo (opcional)" />
    <button id="btnGuardar">✅ Guardar (solo alerta)</button>
    <button id="btnCancelar" type="button">❌ Cancelar</button>
  </div>

  <button id="cancelarSeleccion">✖ Cancelar selección</button>

  <script>
    // ============================================================
    // 1. MAPA
    // ============================================================
    const map = L.map('map').setView([10.4806, -66.9036], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: 'MapaVida'
    }).addTo(map);
    console.log('✅ Mapa creado');

    // Variables de selección
    let ubicacionSeleccionada = null;
    let markerSeleccion = null;

    // ============================================================
    // 2. SELECCIÓN EN EL MAPA
    // ============================================================
    function activarSeleccion() {
      map.getContainer().style.cursor = 'crosshair';
      map.on('click', onMapClick);
      document.getElementById('cancelarSeleccion').style.display = 'block';
    }

    function desactivarSeleccion() {
      map.getContainer().style.cursor = '';
      map.off('click', onMapClick);
      document.getElementById('cancelarSeleccion').style.display = 'none';
      if (markerSeleccion) {
        map.removeLayer(markerSeleccion);
        markerSeleccion = null;
      }
      ubicacionSeleccionada = null;
    }

    function onMapClick(e) {
      const lat = e.latlng.lat;
      const lng = e.latlng.lng;
      ubicacionSeleccionada = { lat, lng };
      document.getElementById('fLatDisplay').textContent = lat.toFixed(6);
      document.getElementById('fLngDisplay').textContent = lng.toFixed(6);
      if (markerSeleccion) map.removeLayer(markerSeleccion);
      markerSeleccion = L.marker([lat, lng]).addTo(map);
      document.getElementById('cancelarSeleccion').style.display = 'none';
    }

    // ============================================================
    // 3. MANEJO DEL FORMULARIO
    // ============================================================
    const formulario = document.getElementById('formulario');
    const btnAgregar = document.getElementById('btnAgregar');
    const btnCancelar = document.getElementById('btnCancelar');
    const btnGuardar = document.getElementById('btnGuardar');
    const btnCancelarSeleccion = document.getElementById('cancelarSeleccion');

    btnAgregar.onclick = function(e) {
      e.preventDefault();
      if (formulario.style.display === 'block') {
        formulario.style.display = 'none';
        desactivarSeleccion();
      } else {
        formulario.style.display = 'block';
        activarSeleccion();
        document.getElementById('fLatDisplay').textContent = '---';
        document.getElementById('fLngDisplay').textContent = '---';
      }
    };

    btnCancelar.onclick = function() {
      formulario.style.display = 'none';
      desactivarSeleccion();
      limpiarFormulario();
    };

    btnCancelarSeleccion.onclick = function() {
      desactivarSeleccion();
      activarSeleccion();
      document.getElementById('fLatDisplay').textContent = '---';
      document.getElementById('fLngDisplay').textContent = '---';
    };

    function limpiarFormulario() {
      document.getElementById('fNombre').value = '';
      document.getElementById('fDireccion').value = '';
      document.getElementById('fCupo').value = '';
      document.getElementById('fLatDisplay').textContent = '---';
      document.getElementById('fLngDisplay').textContent = '---';
    }

    // ============================================================
    // 4. GUARDAR (SOLO ALERTA POR AHORA)
    // ============================================================
    btnGuardar.onclick = function() {
      const nombre = document.getElementById('fNombre').value.trim();
      if (!nombre) { alert('❌ El nombre es obligatorio'); return; }
      if (!ubicacionSeleccionada) { alert('❌ Toca el mapa para seleccionar ubicación'); return; }
      alert('✅ Refugio guardado (simulado):\n' +
            'Nombre: ' + nombre + '\n' +
            'Lat: ' + ubicacionSeleccionada.lat + '\n' +
            'Lng: ' + ubicacionSeleccionada.lng);
      formulario.style.display = 'none';
      desactivarSeleccion();
      limpiarFormulario();
    };
  </script>
</body>
</html>
