<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MapaVida - Refugios</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* --- RESET --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
    }
    /* --- CABECERA --- */
    #header {
      background: #E53935;
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 60px;
      font-weight: bold;
      font-size: 18px;
    }
    #header button {
      background: white;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: bold;
      color: #E53935;
      cursor: pointer;
      font-size: 16px;
    }
    /* --- MAPA --- */
    #map {
      height: calc(100vh - 60px);
      width: 100%;
    }
    /* --- FORMULARIO --- */
    #formulario {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      z-index: 2000;
      width: 90%;
      max-width: 400px;
    }
    #formulario h3 {
      margin-bottom: 15px;
      color: #E53935;
    }
    #formulario input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
    }
    #formulario button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    #btnGuardar {
      background: #4CAF50;
      color: white;
    }
    #btnCancelar {
      background: #666;
      color: white;
    }
    /* --- POPUP DEL MAPA --- */
    .leaflet-popup-content {
      font-size: 14px;
    }
    .cupo {
      font-weight: bold;
      color: #2e7d32;
    }
    /* --- RESPONSIVE --- */
    @media (max-width: 480px) {
      #header {
        font-size: 16px;
        padding: 10px;
      }
      #header button {
        font-size: 14px;
        padding: 6px 12px;
      }
      #formulario {
        padding: 20px;
        width: 95%;
      }
    }
  </style>
</head>
<body>

  <!-- CABECERA -->
  <div id="header">
    <span>🆘 MapaVida</span>
    <button id="btnAgregar">+ Agregar Refugio</button>
  </div>

  <!-- MAPA -->
  <div id="map"></div>

  <!-- FORMULARIO -->
  <div id="formulario">
    <h3>📝 Agregar Refugio</h3>
    <input type="text" id="fNombre" placeholder="Nombre del refugio *" required />
    <input type="text" id="fDireccion" placeholder="Dirección (opcional)" />
    <input type="number" id="fLat" placeholder="Latitud (ej: 10.4910) *" step="any" required />
    <input type="number" id="fLng" placeholder="Longitud (ej: -66.8730) *" step="any" required />
    <input type="number" id="fCupo" placeholder="Cupo disponible (opcional)" />
    <button id="btnGuardar">✅ Guardar Refugio</button>
    <button id="btnCancelar" type="button">❌ Cancelar</button>
  </div>

  <script>
    // ============================================================
    // 1. CONFIGURACIÓN DE SUPABASE (¡REEMPLAZA TU CLAVE ANÓNIMA!)
    // ============================================================
    const SUPABASE_URL = 'https://gtaadqluoljexglenbqo.supabase.co';
    const SUPABASE_ANON_KEY = 'TU_CLAVE_ANON_AQUI'; // <--- PON AQUÍ TU CLAVE REAL

    // ============================================================
    // 2. INICIALIZAR SUPABASE
    // ============================================================
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================================
    // 3. INICIALIZAR MAPA
    // ============================================================
    const map = L.map('map').setView([10.4806, -66.9036], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: 'MapaVida'
    }).addTo(map);

    const markersLayer = L.layerGroup().addTo(map);

    // ============================================================
    // 4. FUNCIONES PARA CARGAR Y MOSTRAR REFUGIOS
    // ============================================================
    async function cargarRefugios() {
      try {
        const { data, error } = await supabase.from('refugios').select('*');
        if (error) throw error;
        // Guardar en caché local
        localStorage.setItem('refugiosCache', JSON.stringify(data));
        mostrarRefugios(data);
      } catch (error) {
        console.warn('Error al cargar desde red, usando caché:', error);
        const cached = localStorage.getItem('refugiosCache');
        if (cached) {
          mostrarRefugios(JSON.parse(cached));
        } else {
          alert('No hay datos disponibles. Conéctate a internet.');
        }
      }
    }

    function mostrarRefugios(refugios) {
      markersLayer.clearLayers();
      refugios.forEach(r => {
        const popupContent = `
          <b>${r.nombre}</b><br>
          ${r.direccion || 'Sin dirección'}<br>
          <span class="cupo">Cupo: ${r.cupo || 0} personas</span>
        `;
        L.marker([r.lat, r.lng])
          .bindPopup(popupContent)
          .addTo(markersLayer);
      });
    }

    // ============================================================
    // 5. MANEJO DEL FORMULARIO
    // ============================================================
    const formulario = document.getElementById('formulario');
    const btnAgregar = document.getElementById('btnAgregar');
    const btnCancelar = document.getElementById('btnCancelar');
    const btnGuardar = document.getElementById('btnGuardar');

    // Mostrar / ocultar formulario
    btnAgregar.addEventListener('click', function(e) {
      e.preventDefault();
      formulario.style.display = (formulario.style.display === 'block') ? 'none' : 'block';
    });

    btnCancelar.addEventListener('click', function() {
      formulario.style.display = 'none';
      limpiarFormulario();
    });

    function limpiarFormulario() {
      document.getElementById('fNombre').value = '';
      document.getElementById('fDireccion').value = '';
      document.getElementById('fLat').value = '';
      document.getElementById('fLng').value = '';
      document.getElementById('fCupo').value = '';
    }

    // Guardar refugio
    btnGuardar.addEventListener('click', async function() {
      const nombre = document.getElementById('fNombre').value.trim();
      const direccion = document.getElementById('fDireccion').value.trim();
      const lat = parseFloat(document.getElementById('fLat').value);
      const lng = parseFloat(document.getElementById('fLng').value);
      const cupo = parseInt(document.getElementById('fCupo').value) || 0;

      // Validaciones
      if (!nombre) {
        alert('❌ El nombre es obligatorio');
        return;
      }
      if (isNaN(lat) || isNaN(lng)) {
        alert('❌ Coordenadas inválidas');
        return;
      }

      // Insertar en Supabase
      const { error } = await supabase
        .from('refugios')
        .insert([{ nombre, direccion, lat, lng, cupo }]);

      if (error) {
        alert('❌ Error al guardar: ' + error.message);
        console.error('Error detallado:', error);
      } else {
        alert('✅ ¡Refugio agregado exitosamente!');
        formulario.style.display = 'none';
        limpiarFormulario();
        cargarRefugios(); // Recargar la lista
      }
    });

    // ============================================================
    // 6. CARGAR REFUGIOS AL INICIAR
    // ============================================================
    cargarRefugios();

    // ============================================================
    // 7. SERVICE WORKER PARA MODO OFFLINE
    // ============================================================
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('✅ Service Worker registrado'))
        .catch(err => console.warn('⚠️ Service Worker no disponible:', err));
    }
  </script>
</body>
</html>
