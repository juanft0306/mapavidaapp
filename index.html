<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapaVida - Prueba Mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; }
    #map { height: 90vh; }
    #btn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 1000;
      padding: 10px 20px;
      background: #E53935;
      color: white;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="btn" onclick="alert('🔥 Botón clickeado')">+ Agregar Refugio</button>
  <div id="map"></div>

  <script>
    alert('🚀 Script cargado');
    const map = L.map('map').setView([10.4806, -66.9036], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: 'MapaVida'
    }).addTo(map);
    alert('✅ Mapa creado');
  </script>
</body>
</html>
