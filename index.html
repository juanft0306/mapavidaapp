<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba de Botón</title>
</head>
<body>
  <button id="btn" style="padding:20px; font-size:20px;">+ Agregar Refugio</button>

  <script>
    // ✅ Alerta al cargar la página
    alert('🚀 Página cargada');

    // Buscar el botón
    const btn = document.getElementById('btn');

    // Verificar si existe
    if (!btn) {
      alert('❌ Botón no encontrado');
    } else {
      alert('✅ Botón encontrado');

      // Asignar evento
      btn.addEventListener('click', function() {
        alert('🔥 ¡CLICK DETECTADO!');
      });

      // También agregar onclick en el HTML por si acaso
      btn.onclick = function() {
        alert('🔥 Click desde onclick');
      };
    }
  </script>
</body>
</html>
