<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapaVida - Refugios</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; }
    #map { height: 90vh; width: 100%; }
    #header {
      background: #E53935;
      color: white;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 10vh;
    }
    #header button {
      background: white;
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: bold;
      color: #E53935;
      cursor: pointer;
    }
    .leaflet-popup-content { font-size: 14px; }
    .cupo { font-weight: bold; color: #2e7d32; }
    
    #formulario {
      display: none;
      background: white;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1000;
    }
    #formulario input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    #formulario button {
      background: #E53935;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      font-weight: bold;
      width: 100%;
      margin-top: 5px;
      cursor: pointer;
    }
    #formulario button[type="button"] {
      background: #666;
    }
    .visible { display: block !important; }
  </style>
</head>
<body>
  <div id="header">
    <span>🆘 MapaVida</span>
    <button id="btnAgregar">+ Agregar Refugio</button>
  </div>
  <div id="map"></div>

  <div id="formulario">
    <h3>📝 Agregar Refugio</h3>
    <input type="text" id="fNombre" placeholder="Nombre del refugio" required>
    <input type="text" id="fDireccion" placeholder="Dirección">
    <input type="number" id="fLat" placeholder="Latitud (ej: 10.4910)" step="any" required>
    <input type="number" id="fLng" placeholder="Longitud (ej: -66.8730)" step="any" required>
    <input type="number" id="fCupo" placeholder="Cupo disponible">
    <button id="btnGuardar">✅ Guardar Refugio</button>
    <button id="btnCancelar" type="button">❌ Cancelar</button>
  </div>

  <script>
    // CONFIGURACIÓN DE SUPABASE (REEMPLAZA CON TUS LLAVES)
    const SUPABASE_URL = 'https://gtaadqluoljexglenbqo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_n_h1fN6QWuEWbFxrCTKFvQ_rxw-o9-Y';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Mapa
    const map = L.map('map').setView([10.4806, -66.9036], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: 'MapaVida'
    }).addTo(map);

    let markersLayer = L.layerGroup().addTo(map);

    async function cargarRefugios() {
      try {
        const { data, error } = await supabase.from('refugios').select('*');
        if (error) throw error;
        localStorage.setItem('refugiosCache', JSON.stringify(data));
        mostrarRefugios(data);
      } catch (error) {
        alert('Error al cargar: ' + error.message);
        const cached = localStorage.getItem('refugiosCache');
        if (cached) mostrarRefugios(JSON.parse(cached));
      }
    }

    function mostrarRefugios(refugios) {
      markersLayer.clearLayers();
      refugios.forEach(r => {
        const popupContent = `
          <b>${r.nombre}</b><br>
          ${r.direccion || 'Sin dirección'}<br>
          <span class="cupo">Cupo: ${r.cupo || 0} personas</span>
        `;
        L.marker([r.lat, r.lng]).bindPopup(popupContent).addTo(markersLayer);
      });
    }

    // Formulario
    const formulario = document.getElementById('formulario');
    const btnAgregar = document.getElementById('btnAgregar');
    const btnCancelar = document.getElementById('btnCancelar');

    btnAgregar.addEventListener('click', function() {
      formulario.classList.toggle('visible');
      if (formulario.classList.contains('visible')) {
        formulario.style.display = 'block';
      } else {
        formulario.style.display = 'none';
      }
    });

    btnCancelar.addEventListener('click', function() {
      formulario.classList.remove('visible');
      formulario.style.display = 'none';
      limpiarFormulario();
    });

    function limpiarFormulario() {
      document.getElementById('fNombre').value = '';
      document.getElementById('fDireccion').value = '';
      document.getElementById('fLat').value = '';
      document.getElementById('fLng').value = '';
      document.getElementById('fCupo').value = '';
    }

    document.getElementById('btnGuardar').addEventListener('click', async function() {
      const nombre = document.getElementById('fNombre').value.trim();
      const direccion = document.getElementById('fDireccion').value.trim();
      const lat = parseFloat(document.getElementById('fLat').value);
      const lng = parseFloat(document.getElementById('fLng').value);
      const cupo = parseInt(document.getElementById('fCupo').value) || 0;

      if (!nombre) return alert('❌ El nombre es obligatorio');
      if (isNaN(lat) || isNaN(lng)) return alert('❌ Coordenadas inválidas');

      const { error } = await supabase
        .from('refugios')
        .insert([{ nombre, direccion, lat, lng, cupo }]);

      if (error) {
        alert('❌ Error al guardar: ' + error.message);
      } else {
        alert('✅ ¡Refugio agregado exitosamente!');
        formulario.classList.remove('visible');
        formulario.style.display = 'none';
        limpiarFormulario();
        cargarRefugios();
      }
    });

    cargarRefugios();
  </script>
</body>
</html>
